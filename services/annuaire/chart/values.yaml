# Values par défaut du chart annuaire.
# Surchargées par values-dev.yaml et values-preview.yaml selon l'environnement.

image:
  # TODO : votre repo GHCR.
  repository: ghcr.io/<votre-handle>/annuaire
  # TODO : remplir au déploiement avec le SHA court.
  tag: ""
  pullPolicy: IfNotPresent

# TODO : combien de répliques par défaut ?
replicaCount: 2

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: nginx
  # TODO : nom DNS local par défaut.
  host: annuaire.devhub.local
  path: /

env:
  LOG_LEVEL: info

# TODO étape 4 (défi) : ajoutez ici un bloc `pdb` pour le PodDisruptionBudget.
# pdb:
#   enabled: false
#   minAvailable: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

securityContext:
  # TODO : alignez avec le USER de votre Dockerfile.
  runAsNonRoot: true
  runAsUser: 1001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

probes:
  readiness:
    path: /healthz
    initialDelaySeconds: 2
    periodSeconds: 5
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
