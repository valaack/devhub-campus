apiVersion: v1
kind: Service
metadata:
  name: {{ include "annuaire.fullname" . }}
  labels:
    {{- include "annuaire.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    # TODO : exposez le port avec un nom (utile pour ingress et observabilité).
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "annuaire.selectorLabels" . | nindent 4 }}
