apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "notif.fullname" . }}-migration
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migration
          image: busybox
          command: ["sh", "-c", "echo 'migration ok' && sleep 2"]
