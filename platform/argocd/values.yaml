# Values Helm pour installer ArgoCD lui-même (chart argo/argo-cd).
# Ce fichier est consommé par `make argocd-install`.
#
# Doc du chart : https://github.com/argoproj/argo-helm/tree/main/charts/argo-cd
#
# Le but de ce fichier : exposer l'UI via l'ingress-nginx du cluster,
# avec un host `argocd.devhub.local`. Le reste est laissé par défaut.

global:
  domain: argocd.devhub.local

configs:
  params:
    # désactive le TLS interne — l'ingress-nginx est devant pour le HTTPS.
    server.insecure: true
  cm:
    # TODO étape 9 : activer les notifications / l'OIDC / des comptes locaux.
    # Pour l'étape 5, vous n'avez rien à ajouter ici.
    timeout.reconciliation: 180s
    # TODO étape 9 : ajouter des `accounts.<user>: login, apiKey` pour
    # créer un compte non-admin destiné aux tests RBAC.

  # TODO étape 9 : ajouter le RBAC ArgoCD ici.
  # Référence : https://argo-cd.readthedocs.io/en/stable/operator-manual/rbac/
  # rbac:
  #   policy.default: ""
  #   policy.csv: |
  #     # TODO : un rôle developer + binding du compte créé ci-dessus
  #     p, role:developer, applications, get, devhub/*, allow
  #     # TODO : compléter pour autoriser le sync uniquement sur ses Apps

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.devhub.local
    annotations:
      # ArgoCD termine son propre TLS en interne. On dit à l'ingress
      # de ne pas refaire de TLS terminaison côté server.
      nginx.ingress.kubernetes.io/backend-protocol: HTTP
    tls: false

# TODO étape 9 (défi) : activer la sous-chart notifications et
# brancher un webhook qui envoie un message à chaque sync échouée.
# notifications:
#   enabled: true
#   ...

# Garde-fou ressources — utile en TP pour ne pas saturer la machine.
controller:
  resources:
    requests: { cpu: "50m", memory: "256Mi" }
    limits:   { cpu: "1",   memory: "1Gi" }

repoServer:
  resources:
    requests: { cpu: "50m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }
