# Application ArgoCD : notif-dev
#
# Variante de annuaire.yaml pour le service notif.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notif-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: devhub

  source:
    # TODO : URL de votre fork.
    repoURL: https://github.com/<votre-handle>/devhub-campus.git
    targetRevision: main
    path: services/notif/chart
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: devhub-dev

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
